{% extends 'base.html' %}

{% block content %}

<style>
.blog-detail {
    max-width: 800px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

/* 📸 изображение */
.blog-image {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    border-bottom: 1px solid #eee;
}

/* 📄 контент */
.blog-content {
    padding: 20px;
}

/* заголовок */
.blog-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
}

/* дата */
.blog-date {
    font-size: 13px;
    color: #888;
    margin-bottom: 15px;
}

/* текст */
.blog-text {
    font-size: 15px;
    line-height: 1.6;
    color: #333;
    white-space: pre-wrap;
}

/* кнопка назад */
.back-link {
    display: inline-block;
    margin-top: 20px;
    color: #0d6efd;
    text-decoration: none;
}

.back-link:hover {
    text-decoration: underline;
}
</style>

<div class="blog-detail">

    {% if blog.image %}
        <img src="{{ blog.image.url }}" class="blog-image">
    {% endif %}

    <div class="blog-content">

        <div class="blog-title">
            {{ blog.title }}
        </div>

        <div class="blog-date">
            {{ blog.created_at|date:"d.m.Y H:i" }}
        </div>

        <div class="blog-text">
            {{ blog.content }}
        </div>

        <a href="javascript:history.back()" class="back-link">
            ← Назад
        </a>

    </div>

</div>

{% endblock %}
