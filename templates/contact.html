{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<style>
/* 📦 центрирование формы */
.contact-wrapper {
    max-width: 600px;
    margin: 40px auto;
}

/* 🧱 карточка формы */
.contact-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

/* заголовок */
.contact-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
}

/* поля формы */
.contact-card input,
.contact-card textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 12px;
    outline: none;
    transition: 0.2s;
}

.contact-card input:focus,
.contact-card textarea:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
}

/* кнопка */
.contact-card button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: Black;
    color: white;
    font-weight: 600;
    transition: 0.2s;
}

.contact-card button:hover {
    background: #0b5ed7;
}
</style>

<div class="contact-wrapper">

    <div class="contact-card">

        <div class="contact-title">
            {% trans "Контакты" %}
        </div>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                {% trans "Отправить" %}
            </button>

        </form>

    </div>

</div>

{% endblock %}
