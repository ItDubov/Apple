{% extends 'base.html' %}
{% block content %}

<h1>🛒 Корзина</h1>

{% for item in cart %}
    <div>
        <h3>{{ item.product.name }}</h3>
        <p>Количество: {{ item.quantity }}</p>
        <p>Цена: {{ item.total_price }} €</p>

        <a href="{% url 'cart_remove' item.product.id %}">Удалить</a>
    </div>
{% endfor %}

<h2>Итого: {{ cart.get_total_price }} €</h2>

<a href="{% url 'checkout' %}">Оформить заказ</a>

{% endblock %}
