{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<style>
/* 📦 контейнер */
.checkout-wrapper {
    max-width: 600px;
    margin: 40px auto;
}

/* 🧱 карточка */
.checkout-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 16px;
    padding: 25px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

/* заголовок */
.checkout-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
}

/* поля */
.checkout-card input,
.checkout-card textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 12px;
    transition: 0.2s;
}

/* фокус */
.checkout-card input:focus,
.checkout-card textarea:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
    outline: none;
}

/* кнопка */
.checkout-btn {
    width: 100%;
    margin-top: 10px;

    background: Black;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;

    font-weight: 600;
    transition: 0.2s;
}

.checkout-btn:hover {
    background: #0b5ed7;
}
</style>

<div class="checkout-wrapper">

    <div class="checkout-card">

        <div class="checkout-title">
            💳 {% trans "Оформление заказа" %}
        </div>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="checkout-btn">
                {% trans "Оплатить" %}
            </button>
        </form>

    </div>

</div>

{% endblock %}
