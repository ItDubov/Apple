{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<div class="container py-5">

    <div class="row g-5 align-items-start">

        <!-- 📸 IMAGE -->
        <div class="col-md-6 text-center">
            <img src="{{ product.image }}"
                 alt="{{ product.name }}"
                 class="img-fluid rounded"
                 style="max-height: 500px; object-fit: contain;">
        </div>

        <!-- 📦 INFO -->
        <div class="col-md-6">

            <!-- TITLE -->
            <h1 class="fw-semibold mb-3" style="font-size: 28px;">
                {{ product.name }}
            </h1>

            <!-- PRICE -->
            <div class="mb-3">
                <span class="fs-4 fw-bold">
                    {{ product.price }} ₽
                </span>
            </div>

            <!-- DESCRIPTION -->
            <p class="text-muted mb-4">
                {{ product.description }}
            </p>

            <!-- OPTIONS -->
            <div class="mb-4">

                <div class="mb-3">
                    <label class="form-label">{% trans "Память" %}</label>
                    <select class="form-select">
                        <option>128 GB</option>
                        <option>256 GB</option>
                        <option>512 GB</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">{% trans "Цвет" %}</label>
                    <select class="form-select">
                        <option>Black</option>
                        <option>White</option>
                        <option>Blue</option>
                    </select>
                </div>

            </div>

            <!-- BUTTON -->
            <button class="btn btn-dark btn-lg w-100 mb-4">
                🛒 {% trans "Добавить в корзину" %}
            </button>

            <!-- SPECS -->
            <div class="mt-4">

                <h5 class="mb-3">{% trans "Характеристики" %}</h5>

                <div class="p-3 border rounded bg-light">
                    <pre class="mb-0" style="white-space: pre-wrap;">
{{ product.characteristics }}
                    </pre>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
