{% extends 'base.html' %}
{% load i18n %}
{% load cache %}

{% block content %}

<!-- 🧠 HEADER SECTION -->
<div style="padding: 24px 40px 10px;">
    <h2 style="margin: 0; font-size: 22px; font-weight: 600;">
        🔥 {% trans "Новинки" %}
    </h2>
    <p style="margin: 6px 0 0; color: #777; font-size: 14px;">
        {% trans "Свежие товары из каталога" %}
    </p>
</div>

<!-- 🔍 FILTER -->
<div style="padding: 10px 40px;">
    <select
        name="category"
        hx-get="{% url 'filter_products' %}"
        hx-target="#products"
        hx-trigger="change"
        hx-swap="innerHTML"
    >
        <option value="">{% trans "Все категории" %}</option>

        {% for category in categories %}
            <option value="{{ category.id }}">
                {{ category.name }}
            </option>
        {% endfor %}
    </select>
</div>

<!-- 📦 PRODUCTS -->
<div id="products" class="products">
    {% include 'partials/product_list.html' %}
</div>

{% endblock %}
