{% extends 'base.html' %}
{% load i18n %}
{% block content %}

<h1>{% trans "Контакты" %}</h1>

{% for blog in blogs %}
    <div>
        <h2>
            <a href="{% url 'blog_detail' blog.slug %}">
                {{ blog.title }}
            </a>
        </h2>
        <p>{{ blog.created_at }}</p>
    </div>
{% endfor %}

{% endblock %}
